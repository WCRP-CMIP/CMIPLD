name: Install CMIPLD Library
description: Installs the CMIPLD Python library from a GitHub repository

inputs:
  branch:
    description: Branch of the repository — may also be a tag or commit hash
    required: false
    default: main

runs:
  using: composite
  steps:
    - name: Checkout the library repository
      uses: actions/checkout@v4
      with:
        repository: WCRP-CMIP/CMIPLD
        ref: ${{ inputs.branch }}
        path: .cmipld-src

    - name: Set up Node.js (for JSONLD-Recursive)
      uses: actions/setup-node@v4
      with:
        node-version: 18
        # No cache: npm — avoids requiring package-lock.json in calling repos

    - name: Install JSONLD-Recursive (npm)
      shell: bash
      run: npm i -g jsonld-recursive

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-cmipld-${{ inputs.branch }}
        restore-keys: |
          ${{ runner.os }}-pip-cmipld-

    - name: Install CMIPLD Python library
      shell: bash
      run: |
        pip install git+https://github.com/WCRP-CMIP/CMIPLD.git@${{ inputs.branch }}

        CMIPLD_VERSION=$(python -c "import cmipld; print(cmipld.__version__)")

        echo "- [x] Installed CMIPLD library from branch ${{ inputs.branch }} (version: ${CMIPLD_VERSION})" >> $GITHUB_STEP_SUMMARY
